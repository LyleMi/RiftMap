[scan]
port = 22
protocol = "ssh"
# Optional multi-service mode. When set, each target IP is scanned once per
# service endpoint. The legacy port/protocol fields above remain for single
# service configs and older jobs.
# services = [
#   { port = 22, protocol = "ssh" },
#   { port = 25, protocol = "smtp" },
#   { port = 3306, protocol = "mysql" },
# ]
syn_attempts = 3
# Raw SYN probe shape. source_port = 0 chooses a stable per-target port from
# Linux's default ephemeral range; set a non-zero value only for legacy fixed
# port behavior.
source_port = 0
syn_ttl = 64
syn_window_size = 64240
syn_window_scale = 7
connect_timeout_ms = 3000
banner_timeout_ms = 5000
banner_max_bytes = 4096
banner_attempts = 2
banner_concurrency = 512
banner_connects_per_second = 200
banner_queue_capacity = 8192
# Optional protection only; time budgets below are for estimation and do not stop scans.
# max_runtime_secs = 86400

[scan.ssh]
# passive_banner keeps the original safety model: connect, read the server
# identification line, and close without sending SSH protocol data.
# version_exchange additionally sends client_id after the server banner.
# kexinit_probe sends client_id plus a minimal KEXINIT packet and records the
# server's advertised SSH algorithms when available.
probe_mode = "passive_banner"
client_id = "SSH-2.0-OpenSSH_9.7p1"

[budget]
# Optional estimation inputs for large jobs.
# time_budget_secs = 7200
# expected_open_ratio = 0.01
# Set true to stop the scan when time_budget_secs is reached.
enforce_time_budget = false

[targets]
include = ["fixtures/targets.example.txt"]
exclude = ["fixtures/exclude.example.txt"]
allow_private = false
max_targets = 25000000

[network]
interface = "eth0"
source_ip = "auto"
provider_egress_mbps = 100
application_ratio = 0.80
# Optional live override for application pacing. The file content is a positive
# Mbps value, for example "40"; invalid or partial writes keep the last value.
# dynamic_application_mbps_file = ".riftmap/application-mbps"
tc_ratio = 0.85
require_tc = true
accounting = "estimated-wire"

[output]
job_root = ".riftmap/jobs"
output_all = false

[simulation]
# Set true to exercise the full job/export/report pipeline without touching the network.
enabled = false
open_ratio = 0.01
closed_ratio = 0.10
unreachable_ratio = 0.01
seed = "riftmap-sim-v1"
rtt_min_ms = 1.0
rtt_max_ms = 200.0
banner = true
