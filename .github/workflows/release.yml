name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release (for example v0.1.0)
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false
      - name: Validate tag and crate version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          test "${RELEASE_TAG#v}" = "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"
          git rev-parse --verify "refs/tags/${RELEASE_TAG}"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: release
      - name: Build release binary
        run: cargo build --locked --release
      - name: Package binary and checksums
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          package="riftmap-${version}-x86_64-unknown-linux-gnu"
          mkdir "$package"
          cp target/release/riftmap README.md README.zh-CN.md LICENSE-MIT LICENSE-APACHE "$package/"
          tar -czf "${package}.tar.gz" "$package"
          sha256sum "${package}.tar.gz" > SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release create "$RELEASE_TAG" riftmap-*.tar.gz SHA256SUMS --verify-tag --generate-notes
